apiVersion: v1
kind: Namespace
metadata:
  name: spam-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spam-operator
  namespace: spam-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spam-operator
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  # Permissions for Gateway API resources are declared proactively. If the
  # CRDs aren't installed, the operator's discovery probe skips the watchers
  # and these rules are harmless.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - gatewayclasses
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spam-operator
subjects:
  - kind: ServiceAccount
    name: spam-operator
    namespace: spam-operator
roleRef:
  kind: ClusterRole
  name: spam-operator
  apiGroup: rbac.authorization.k8s.io
