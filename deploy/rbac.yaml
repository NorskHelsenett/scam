apiVersion: v1
kind: Namespace
metadata:
  name: spam-agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spam-agent
  namespace: spam-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spam-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  # Permissions for Gateway API resources are declared proactively. If the
  # CRDs aren't installed, the agent's discovery probe skips the watchers
  # and these rules are harmless.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - gatewayclasses
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
    verbs: ["get", "list", "watch"]
  # Traefik's own CRDs for HTTP/TCP/UDP routing. The agent probes for the
  # current "traefik.io" and legacy "traefik.containo.us" groups.
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources:
      - ingressroutes
      - ingressroutetcps
      - ingressrouteudps
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spam-agent
subjects:
  - kind: ServiceAccount
    name: spam-agent
    namespace: spam-agent
roleRef:
  kind: ClusterRole
  name: spam-agent
  apiGroup: rbac.authorization.k8s.io
